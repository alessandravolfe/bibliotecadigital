<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Biblioteca Digital</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav>
    <div class="logo">📚 Biblioteca Digital</div>

    <div>
      <a href="index.html">Início</a>
      <a href="cadastro.html" class="btn">Criar Conta</a>
    </div>
  </nav>

  <main class="login-area">
    <section class="login-card">
      <h1>Bem-vindo de volta</h1>
      <p>Entre para acessar sua biblioteca.</p>

      <form>
        <label for="email">Seu e-mail</label>
        <input id="email" type="email" placeholder="seuemail@exemplo.com" required>

        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="Digite sua senha" required>

        <button type="button">Entrar na biblioteca</button>
      </form>

      <p class="login-link">
        Ainda não tem uma conta?
        <a href="cadastro.html">Criar conta e ativar meu eBook</a>
      </p>
    </section>
  </main>

  <footer>© 2026 Biblioteca Digital</footer>
</body>
</html>
