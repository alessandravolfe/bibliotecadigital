<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | Biblioteca Digital</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <nav>
    <div class="logo">📚 Biblioteca Digital</div>

    <div>
      <a href="index.html">Início</a>
      <a href="login.html">Entrar</a>
    </div>
  </nav>

  <main class="login-area">
    <section class="login-card">
      <h1>Crie sua conta</h1>
      <p>Use o código recebido após sua compra no GGMAX.</p>

      <form>
        <label for="nome">Seu nome</label>
        <input id="nome" type="text" placeholder="Digite seu nome" required>

        <label for="email">Seu e-mail</label>
        <input id="email" type="email" placeholder="seuemail@exemplo.com" required>

        <label for="senha">Crie uma senha</label>
        <input id="senha" type="password" placeholder="Crie uma senha" required>

        <label for="pin">Código de ativação</label>
        <input id="pin" type="text" placeholder="Ex.: BD-AB12-CD34" required>

        <button type="button">Criar conta e ativar eBook</button>
      </form>

      <p class="login-link">
        Já tem uma conta?
        <a href="login.html">Entrar na biblioteca</a>
      </p>
    </section>
  </main>

  <footer>© 2026 Biblioteca Digital</footer>
</body>
</html>
